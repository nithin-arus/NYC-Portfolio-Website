<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nithin · Vignelli-Inspired Portfolio — Explorations</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #root { width: 100vw; height: 100vh; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="variations/primitives.jsx"></script>
  <script type="text/babel" src="variations/station-board.jsx"></script>
  <script type="text/babel" src="variations/departure-board.jsx"></script>
  <script type="text/babel" src="variations/signage-plate.jsx"></script>
  <script type="text/babel" src="variations/schematic-index.jsx"></script>

  <script type="text/babel">
    const W = 1440;
    const H = 900;

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="explorations"
            title="Portfolio — Vignelli-Inspired Explorations"
            subtitle="Four distinct structural takes on a transit-signage-influenced personal portfolio. Click into any artboard's tabs/dots — they're live."
          >
            <DCArtboard id="01-station-board" label="01 · Station Board (per brief)" width={W} height={H}>
              <StationBoard />
            </DCArtboard>

            <DCArtboard id="02-departure-board" label="02 · Departure Board" width={W} height={H}>
              <DepartureBoard />
            </DCArtboard>

            <DCArtboard id="03-signage-plate" label="03 · Signage Plate (no tabs)" width={W} height={H}>
              <SignagePlate />
            </DCArtboard>

            <DCArtboard id="04-schematic-index" label="04 · Schematic Index" width={W} height={H}>
              <SchematicIndex />
            </DCArtboard>
          </DCSection>

          <DCPostIt top={40} left={40} rotate={-3} width={220}>
            Aesthetic only — placeholder copy. No real names, line letters, or maps. Notes on each variation below.
          </DCPostIt>

          <DCPostIt top={H + 220} left={40} rotate={1.5} width={240}>
            <strong>01 Station Board</strong> — your spec, faithful. Vertical tabs, bolted-plate feel, four content views.
          </DCPostIt>
          <DCPostIt top={H + 220} left={W + 100} rotate={-1.5} width={240}>
            <strong>02 Departure Board</strong> — top nav with a continuous route line snaking through tab markers. Dense schedule/board content.
          </DCPostIt>
          <DCPostIt top={H + 220} left={W * 2 + 160} rotate={2} width={240}>
            <strong>03 Signage Plate</strong> — no tabs. Everything visible. Reads like a 1970s manual cover plate.
          </DCPostIt>
          <DCPostIt top={H + 220} left={W * 3 + 220} rotate={-1} width={240}>
            <strong>04 Schematic Index</strong> — the nav IS the map. Click colored station dots to switch content.
          </DCPostIt>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
